clickhouse:
  image: clickhouse/clickhouse-server:24.8
  database: runesight
  user: runesight
  password: ""          # required at install: --set clickhouse.password=...
  volumeSize: 20Gi
  storageClass: local
  memoryLimit: 4Gi

  # Extra ClickHouse server config, mounted at
  # /etc/clickhouse-server/config.d/extra.xml. ONE LINE of XML (the mount
  # shadows the image's docker_related_config.xml, so listen_host must stay).
  # To enable S3 tiering, replace this with the storage_configuration
  # one-liner from the README and set storage_policy in your runefile.
  extraConfigXml: <clickhouse><listen_host>::</listen_host></clickhouse>
