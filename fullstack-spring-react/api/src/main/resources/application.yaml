server:
  port: 8080

spring:
  application:
    name: notes-api
  # Local-dev defaults. On Rune these are overridden by SPRING_DATASOURCE_*
  # env vars injected from the db-credentials secret (see runeset/casts/api.service.yaml).
  datasource:
    url: jdbc:postgresql://localhost:5432/notes
    username: notes
    password: notes
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
