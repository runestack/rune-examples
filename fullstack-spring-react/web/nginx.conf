server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Spring Boot service via Rune's embedded DNS.
    # <service>.<namespace>.rune resolves to the service VIP inside the cluster.
    location /api/ {
        proxy_pass http://api.demo.rune:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Probe target for Rune health checks (see web.service.yaml).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}
